<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal</title>
    <style>
        body { background-color: #FFE5EC; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        .card { background: white; padding: 2rem; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative; }
        .admin-dots { position: absolute; top: 10px; right: 15px; cursor: pointer; color: #ccc; font-size: 24px; z-index: 2000; user-select: none; padding: 5px; }
        .mochi-svg { width: 180px; height: 180px; margin: 0 auto 20px auto; }
        .btn-box { display: flex; justify-content: center; gap: 20px; margin-top: 20px; min-height: 60px; position: relative; }
        #yesBtn { padding: 12px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #ff8fa3; color: white; position: relative; z-index: 1000; font-size: 1.1rem; }
        #noBtn { padding: 12px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #eee; position: relative; z-index: 500; }
        .evade { position: fixed !important; z-index: 500; transition: 0.1s; }
    </style>
</head>
<body>

<div class="card" id="card">
    <div class="admin-dots" onclick="adminMenu()">⋮</div>
    
    <div id="main-content">
        <div class="mochi-svg" id="mochi">
            <svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="25" fill="#fff"/><circle cx="38" cy="45" r="3"/><circle cx="62" cy="45" r="3"/><path d="M42 52 Q50 58 58 52" stroke="#333" stroke-width="2" fill="none"/></svg>
        </div>
        <h1 id="heading">Do you love me?</h1>
        <p>~ <span id="name-display">Ankit</span> is all yours</p>
        <div class="btn-box">
            <button id="yesBtn" onclick="celebrate()">Yes</button>
            <button id="noBtn" onclick="handleNo()">No</button>
        </div>
    </div>
</div>

<script>
    let step = 0;
    
    // 1. Instantly read the saved name or default to Ankit on startup
    let currentName = localStorage.getItem('proposalName') || "virat";
    document.getElementById('name-display').innerText = currentName;

    // 2. Admin Logic: Updates memory directly and reloads to stay completely glitch-free
    function adminMenu() {
        let password = prompt("Admin Password:");
        if (password === "1234567") {
            let newName = prompt("Enter new name:", currentName);
            if (newName && newName.trim() !== "") {
                localStorage.setItem('proposalName', newName.trim());
                // Instantly reload page so the new name is locked into layout clean
                location.reload();
            }
        } else if (password !== null) {
            alert("Wrong password!");
        }
    }

    function handleNo() {
        const mochi = document.getElementById('mochi');
        const stages = [
            '<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="25" fill="#fff"/><circle cx="38" cy="45" r="3"/><circle cx="62" cy="45" r="3"/><path d="M42 55 Q50 50 58 55" stroke="#333" stroke-width="2" fill="none"/></svg>',
            '<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="25" fill="#fff"/><circle cx="38" cy="45" r="3"/><circle cx="62" cy="45" r="3"/><path d="M40 60 Q50 65 60 60" stroke="#333" stroke-width="2" fill="none"/></svg>',
            '<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="25" fill="#fff"/><path d="M35 40 L45 45 M65 40 L55 45" stroke="#333" stroke-width="3"/><path d="M40 65 Q50 70 60 65" stroke="#333" stroke-width="2" fill="none"/></svg>'
        ];
        
        if (step < 3) {
            mochi.innerHTML = stages[step];
            document.getElementById('heading').innerText = ["Are you sure?", "Think again!", "Last chance!"][step];
            step++;
        } else {
            const btn = document.getElementById('noBtn');
            btn.classList.add('evade');
            btn.style.top = Math.random() * 70 + "vh";
            btn.style.left = Math.random() * 70 + "vw";
        }
    }

    function celebrate() {
        // Clear evasions if active
        document.getElementById('noBtn').style.display = 'none';
        
        document.getElementById('card').innerHTML = `
            <div class="admin-dots" onclick="adminMenu()">⋮</div>
            <div style="font-size: 80px; margin-bottom: 20px;">🎉💖✨</div>
            <h1>YAYYY! I KNEW IT!</h1>
            <p>You made <b>${currentName}</b> the happiest person!</p>
            <button onclick="location.reload()" style="background:#ff8fa3; color:white; border:none; padding:12px 25px; border-radius:10px; cursor:pointer; font-weight:bold; margin-top:20px; position:relative; z-index:1001;">Reset</button>
            <p style="font-size: 11px; color: #aaa; margin-top: 15px; font-weight: bold; letter-spacing: 1px;">MADE BY VIRAT</p>
        `;
    }
</script>
</body>
</html>
